version: "3.9"

services:

  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentdb

    ports:
      - "5432:5432"

  backend:
    build: ./backend

    ports:
      - "8000:8000"

    env_file:
      - .env.example

    depends_on:
      - postgres

  frontend:
    build: ./frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend
